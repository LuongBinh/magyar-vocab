<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magyar Vocab — Hungarian Vocabulary with IPA, Meanings & Mnemonics</title>
  <meta name="description" content="Learn Hungarian vocabulary with IPA pronunciation, English meanings and memory aids. 4,550 words from everyday Hungarian." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+HK:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇭🇺</text></svg>" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🇭🇺</span>
        <span class="logo-text">Magyar<span class="logo-accent">Vocab</span></span>
      </div>
      <div class="header-controls">
        <span class="header-badge">4,550 words · IPA</span>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <!-- ========== MAIN LAYOUT ========== -->
  <div class="main-container">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">

      <!-- Alphabet Index -->
      <div class="sidebar-section">
        <div class="sidebar-title">Alphabet</div>
        <div class="alpha-index" id="alphaIndex"></div>
      </div>

      <!-- Difficulty Filter -->
      <div class="sidebar-section">
        <div class="sidebar-title">Difficulty</div>
        <div class="diff-filters">
          <button class="diff-btn active" data-diff="">
            <span class="diff-dot" style="background:var(--text-light)"></span> All
            <span class="diff-count" id="diffAllCount">0</span>
          </button>
          <button class="diff-btn" data-diff="easy">
            <span class="diff-dot easy"></span> Common
            <span class="diff-count" id="easyCount">0</span>
          </button>
          <button class="diff-btn" data-diff="medium">
            <span class="diff-dot medium"></span> Medium
            <span class="diff-count" id="mediumCount">0</span>
          </button>
          <button class="diff-btn" data-diff="hard">
            <span class="diff-dot hard"></span> Rare
            <span class="diff-count" id="hardCount">0</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- ===== CONTENT ===== -->
    <main class="content-area">

      <!-- Floating Alphabet Bar (sticky on scroll) -->
      <div class="alpha-float" id="alphaFloat">
        <div class="alpha-float-inner" id="alphaFloatInner"></div>
      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="all">All Words</button>
        <button class="tab-btn" data-tab="bookmarks">Bookmarks</button>
      </div>

      <!-- Search Bar -->
      <div class="search-bar">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search Hungarian or English..." />
        <button class="clear-btn" id="searchClear" style="display:none" aria-label="Clear search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="count" id="resultCount">Showing <strong>0</strong> words</div>
        <div class="view-toggles">
          <button class="view-btn active" data-view="cards">Cards</button>
          <button class="view-btn" data-view="list">List</button>
        </div>
      </div>

      <!-- Tab Content -->
      <div class="tab-content">
        <div class="word-grid" id="wordGrid"></div>
        <div class="list-view" id="listView" style="display:none"></div>
      </div>

    </main>
  </div>

  <!-- ========== TOAST ========== -->
  <div class="toast" id="toast"></div>

  <!-- ========== SCRIPTS (order matters!) ========== -->
  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
